name: Deploy Holowan site
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Local site verification
        run: python3 scripts/verify_site.py
      - name: Brand scrub
        run: |
          if grep -RniE 'kotor\.js|kotorjs|reone|openkotor|borealis|kobaltblu|seedhartha|openkotor\.com|openkotor\.github\.io' site/ \
            --include='*.html' --include='*.js' --include='*.css' --include='*.txt' --include='*.xml'; then
            echo "Banned brand token found in site/" >&2
            exit 1
          fi
          echo "OK brand scrub"
      - name: Pages must stay public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/check_pages_health.sh
          ./scripts/check_pages_health.sh "${{ github.repository }}"

  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
